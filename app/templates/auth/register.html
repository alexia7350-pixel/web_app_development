{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card shadow-lg border-0">
            <div class="text-center mb-4 mt-2">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-egg-fried fs-2"></i>
                </div>
                <h2 class="fw-bold" style="letter-spacing: -0.5px;">建立新帳號</h2>
                <p class="text-secondary mt-2">加入我們的社群，開始珍藏與分享您的私房食譜！</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">名稱 / 暱稱 Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" name="username" placeholder="Gordon Ramsay" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">電子信箱 Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" name="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-5">
                    <label class="form-label text-muted small fw-bold">密碼 Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" name="password" placeholder="請設定最少 8 個字元" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-custom w-100 rounded-pill py-3 fw-bold fs-6 shadow-sm">
                    註冊帳號 <i class="bi bi-person-plus ms-1"></i>
                </button>
            </form>
            
            <div class="text-center mt-5 pt-4 border-top">
                <p class="mb-0 text-secondary fw-medium">已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-bold ms-1 border-bottom border-primary pb-1">馬上登入</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
