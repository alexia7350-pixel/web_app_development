{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card shadow-lg border-0">
            <div class="text-center mb-5 mt-2">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle mb-3" style="width: 70px; height: 70px;">
                    <i class="bi bi-person-fill fs-2"></i>
                </div>
                <h2 class="fw-bold" style="letter-spacing: -0.5px;">登入您的帳號</h2>
                <p class="text-secondary mt-2">歡迎回到 RecipeHub，找尋下一次的料理靈感</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">電子信箱 Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" name="email" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="mb-5">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label text-muted small fw-bold mb-0">密碼 Password</label>
                        <a href="#" class="small text-decoration-none text-muted">忘記密碼？</a>
                    </div>
                    <div class="input-group mt-2">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-custom w-100 rounded-pill py-3 fw-bold fs-6 shadow-sm">
                    立即登入 <i class="bi bi-arrow-right ms-1"></i>
                </button>
            </form>
            
            <div class="text-center mt-5 pt-4 border-top">
                <p class="mb-0 text-secondary fw-medium">還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-bold ms-1 border-bottom border-primary pb-1">立即註冊</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
